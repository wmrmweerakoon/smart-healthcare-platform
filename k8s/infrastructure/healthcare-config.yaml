apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-config
  labels:
    app: healthcare-platform
data:
  # Base URLs for Internal Service-to-Service Communication
  AUTH_SERVICE_URL: "http://auth-service:5001"
  PATIENT_SERVICE_URL: "http://patient-service:5002"
  DOCTOR_SERVICE_URL: "http://doctor-service:5003"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:5004"
  PAYMENT_SERVICE_URL: "http://payment-service:5005"
  NOTIFICATION_SERVICE_URL: "http://notification-service:5006"
  ADMIN_SERVICE_URL: "http://admin-service:5007"
  TELEMEDICINE_SERVICE_URL: "http://telemedicine-service:5008"
  API_GATEWAY_URL: "http://api-gateway:3000"
  
  # Database Configuration
  MONGO_URI_BASE: "mongodb://mongodb-service:27017"
  
  # Other settings
  JWT_EXPIRE: "7d"
  NODE_ENV: "production"
