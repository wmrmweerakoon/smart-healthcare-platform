version: '3.8'

services:
  # ─── MongoDB ──────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: healthcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Auth Service ─────────────────────────────────────
  auth-service:
    build:
      context: ..
      dockerfile: docker/auth-service.Dockerfile
    container_name: healthcare-auth-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/healthcare-auth
      - JWT_SECRET=healthcare_jwt_secret_key_2024
      - JWT_EXPIRE=7d
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── API Gateway ──────────────────────────────────────
  api-gateway:
    build:
      context: ..
      dockerfile: docker/api-gateway.Dockerfile
    container_name: healthcare-api-gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=healthcare_jwt_secret_key_2024
      - AUTH_SERVICE_URL=http://auth-service:5001
      - PATIENT_SERVICE_URL=http://patient-service:5002
      - DOCTOR_SERVICE_URL=http://doctor-service:5003
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5004
      - PAYMENT_SERVICE_URL=http://payment-service:5005
      - NOTIFICATION_SERVICE_URL=http://notification-service:5006
      - AI_SERVICE_URL=http://ai-service:5007
      - ADMIN_SERVICE_URL=http://admin-service:5008
      - VIDEO_SERVICE_URL=http://telemedicine-service:5009
    depends_on:
      - auth-service
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── React Client ─────────────────────────────────────
  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
    container_name: healthcare-client
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Patient Service ─────────────────────────────────
  patient-service:
    build:
      context: ..
      dockerfile: docker/patient-service.Dockerfile
    container_name: healthcare-patient-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/healthcare-patient
      - JWT_SECRET=healthcare_jwt_secret_key_2024
    volumes:
      - patient_uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Admin Service ────────────────────────────────────
  admin-service:
    build:
      context: ..
      dockerfile: docker/admin-service.Dockerfile
    container_name: healthcare-admin-service
    ports:
      - "5008:5008"
    environment:
      - PORT=5008
      - MONGO_URI=mongodb://mongodb:27017/healthcare-auth
      - JWT_SECRET=healthcare_jwt_secret_key_2024
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5004
      - PAYMENT_SERVICE_URL=http://payment-service:5005
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Doctor Service ─────────────────────────────────
  doctor-service:
    build:
      context: ..
      dockerfile: docker/doctor-service.Dockerfile
    container_name: healthcare-doctor-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/healthcare-doctor
      - JWT_SECRET=healthcare_jwt_secret_key_2024
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Appointment Service ────────────────────────────
  appointment-service:
    build:
      context: ..
      dockerfile: docker/appointment-service.Dockerfile
    container_name: healthcare-appointment-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://mongodb:27017/healthcare-appointment
      - JWT_SECRET=healthcare_jwt_secret_key_2024
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Telemedicine Service ───────────────────────────
  telemedicine-service:
    build:
      context: ..
      dockerfile: docker/telemedicine-service.Dockerfile
    container_name: healthcare-telemedicine-service
    ports:
      - "5009:5009"
    environment:
      - PORT=5009
      - MONGO_URI=mongodb://mongodb:27017/healthcare-telemedicine
      - JWT_SECRET=healthcare_jwt_secret_key_2024
      - JITSI_DOMAIN=meet.jit.si
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Payment Service ──────────────────────────────
  payment-service:
    build:
      context: ..
      dockerfile: docker/payment-service.Dockerfile
    container_name: healthcare-payment-service
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://mongodb:27017/healthcare-payment
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── Notification Service ─────────────────────────
  notification-service:
    build:
      context: ..
      dockerfile: docker/notification-service.Dockerfile
    container_name: healthcare-notification-service
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
      - MONGO_URI=mongodb://mongodb:27017/healthcare-notification
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-"HealthCare+ Platform" <noreply@healthcareplus.com>}
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

  # ─── AI Service ───────────────────────────────────
  ai-service:
    build:
      context: ..
      dockerfile: docker/ai-service.Dockerfile
    container_name: healthcare-ai-service
    ports:
      - "5007:5007"
    environment:
      - PORT=5007
      - MONGO_URI=mongodb://mongodb:27017/healthcare-ai
      - GOOGLE_AI_KEY=AIzaSyBHu6Wx3W077B6R6TeHAR_cUI3pVyPUfOo
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    restart: unless-stopped

volumes:
  mongodb_data:
  patient_uploads:

networks:
  healthcare-network:
    driver: bridge
